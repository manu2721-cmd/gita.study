<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>श्रीमद्भगवद्गीता — अध्ययन सूचकांक</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=Mukta:wght@300;400;500;600;700&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{--bg-deep:#180f2e;--bg-deep-alt:#241a42;--gold:#c9a227;--gold-light:#e6c863;--maroon:#8c2c3b;--cream:#f3e9d2;--cream-dim:#cfc3a8;--sage:#5c8374;--line:rgba(201,162,39,0.25);--shadow:0 18px 50px rgba(0,0,0,0.45);}
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(ellipse at 50% -10%, #2e2153 0%, var(--bg-deep) 55%, #100a1f 100%);color:var(--cream);font-family:'Mukta',sans-serif;line-height:1.7;padding:32px 16px 56px;}
  .wrap{max-width:880px;margin:0 auto;}
  .hero{text-align:center;background:linear-gradient(160deg, var(--bg-deep-alt), #1b1336);border:1px solid var(--line);border-radius:18px;padding:40px 28px 32px;box-shadow:var(--shadow);margin-bottom:30px;}
  .eyebrow{font-size:13px;letter-spacing:0.12em;color:var(--gold-light);text-transform:uppercase;margin-bottom:8px;}
  .title{font-family:'Tiro Devanagari Hindi',serif;font-size:30px;color:var(--cream);margin-bottom:8px;}
  .subtitle{font-size:14.5px;color:var(--cream-dim);margin-bottom:22px;}
  .progress-row{display:flex;align-items:center;gap:12px;max-width:380px;margin:0 auto;}
  .progress-track{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));}
  .progress-label{font-size:12.5px;color:var(--cream-dim);white-space:nowrap;}
  .chap-grid{display:flex;flex-direction:column;gap:12px;}
  .chap-card{display:flex;align-items:center;gap:16px;background:var(--bg-deep-alt);border:1px solid var(--line);border-radius:14px;padding:16px 20px;text-decoration:none;color:var(--cream);transition:transform 0.15s ease, border-color 0.15s ease;}
  .chap-card:hover{transform:translateY(-2px);border-color:var(--gold);}
  .chap-card.empty{opacity:0.4;pointer-events:none;border-style:dashed;}
  .chap-num{flex-shrink:0;width:48px;height:48px;border-radius:50%;background:rgba(201,162,39,0.12);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Tiro Devanagari Hindi',serif;font-size:16px;color:var(--gold-light);}
  .chap-card.empty .chap-num{border-color:var(--line);color:var(--cream-dim);background:transparent;}
  .chap-info{flex:1;min-width:0;}
  .chap-title{font-family:'Tiro Devanagari Hindi',serif;font-size:16px;color:var(--cream);margin-bottom:4px;}
  .chap-meta{font-size:12.5px;color:var(--cream-dim);}
  .chap-bar-track{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:6px;width:140px;max-width:40vw;}
  .chap-bar-fill{height:100%;background:linear-gradient(90deg,var(--sage),#7fa894);}
  .chap-arrow{flex-shrink:0;font-size:18px;color:var(--gold);}
  .chap-card.empty .chap-arrow{color:var(--cream-dim);}
  .footer-note{text-align:center;font-size:13px;color:var(--cream-dim);margin-top:26px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="eyebrow">संपूर्ण अध्ययन परियोजना</div>
    <div class="title">श्रीमद्भगवद्गीता</div>
    <div class="subtitle">18 अध्याय · 700 श्लोक · शब्दार्थ, भावार्थ, उदाहरण व अभ्यास सहित</div>
    <div class="progress-row">
      <span class="progress-label" id="overallLabel">… / 700 श्लोक</span>
      <div class="progress-track"><div class="progress-fill" id="overallFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="chap-grid" id="chapGrid"></div>

  <div class="footer-note" id="footerNote"></div>
</div>

<script>
  fetch('manifest.json')
    .then(function(r){ return r.json(); })
    .then(function(manifest){
      var grid = document.getElementById('chapGrid');
      var totalPublished = 0;
      manifest.chapters.forEach(function(ch){
        totalPublished += ch.published;
        var pct = Math.round((ch.published / ch.totalVerses) * 100);
        var el = document.createElement(ch.published > 0 ? 'a' : 'div');
        el.className = 'chap-card' + (ch.published === 0 ? ' empty' : '');
        if (ch.published > 0) el.href = ch.folder + '/gita_' + ch.num + '_1.html';
        el.innerHTML =
          '<div class="chap-num">' + ch.num + '</div>' +
          '<div class="chap-info">' +
            '<div class="chap-title">अध्याय ' + ch.num + ' — ' + ch.title + '</div>' +
            '<div class="chap-meta">' + ch.published + ' / ' + ch.totalVerses + ' श्लोक प्रकाशित' + (ch.published === 0 ? ' · जल्द आरंभ होगा' : '') + '</div>' +
            '<div class="chap-bar-track"><div class="chap-bar-fill" style="width:' + pct + '%"></div></div>' +
          '</div>' +
          (ch.published > 0 ? '<div class="chap-arrow">→</div>' : '');
        grid.appendChild(el);
      });
      var overallPct = (totalPublished / manifest.totalVerses * 100).toFixed(1);
      document.getElementById('overallLabel').textContent = totalPublished + ' / ' + manifest.totalVerses + ' श्लोक';
      document.getElementById('overallFill').style.width = overallPct + '%';
      document.getElementById('footerNote').textContent = '✅ ' + totalPublished + ' श्लोक दर्ज — शेष श्लोक चरणबद्ध रूप से जोड़े जा रहे हैं';
    })
    .catch(function(err){
      document.getElementById('chapGrid').innerHTML = '<p style="color:var(--cream-dim);text-align:center;">सूची लोड नहीं हो सकी — manifest.json जाँचें</p>';
    });
</script>
<script src="nav.js"></script>
</body>
</html>
